services:
  api:
    build: .
    container_name: taxi-tip-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/random_forest_regressor_model.pkl
      - SCALER_PATH=/app/models/scaler.pkl
      - METADATA_PATH=/app/models/model_metadata.json
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: taxi-tip-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  mlflow-data:
