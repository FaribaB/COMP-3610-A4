version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxi-tip-api
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/rfreg_pipe.pkl
      METADATA_PATH: /app/models/model_metadata.json
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /mlflow
    command: >
      sh -c "pip install --no-cache-dir mlflow &&
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri sqlite:///mlflow.db
             --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    restart: unless-stopped